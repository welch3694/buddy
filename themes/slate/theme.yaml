id: slate
name: Slate
palette:
  void: "#0a0c10"
  void_mid: "#12161c"
  teal: "#8aa0b0"
  cyan: "#a8bcc8"
  ice: "#d0dce4"
  amber: "#c8b070"
  muted: "#5a6a78"
  danger: "#6a7880"
fonts:
  display: '"Orbitron", sans-serif'
  mono: '"Share Tech Mono", ui-monospace, monospace'
orb:
  base:
    core: "#2a3540"
    glow: "rgba(138, 160, 176, 0.35)"
    ring: "rgba(168, 188, 200, 0.55)"
    scale: 1
    breathe_amp: 0.04
    breathe_ms: 3200
    bloom_opacity: 0.35
    shimmer_opacity: 0
    ring_spin_ms: 18000
    saturate: 1
  states:
    listening:
      core: "#34404c"
      glow: "rgba(138, 160, 176, 0.4)"
      ring: "rgba(168, 188, 200, 0.5)"
      scale: 1
      breathe_amp: 0.035
      breathe_ms: 3400
      bloom_opacity: 0.4
      shimmer_opacity: 0
      ring_spin_ms: 22000
    holding:
      core: "#3e4c5a"
      glow: "rgba(160, 180, 200, 0.45)"
      ring: "rgba(180, 200, 215, 0.65)"
      scale: 1.02
      breathe_amp: 0.07
      breathe_ms: 2400
      bloom_opacity: 0.5
      shimmer_opacity: 0.25
      ring_spin_ms: 10000
    generating:
      core: "#485868"
      glow: "rgba(168, 188, 200, 0.55)"
      ring: "rgba(200, 215, 225, 0.7)"
      scale: 1.04
      breathe_amp: 0.055
      breathe_ms: 1400
      bloom_opacity: 0.55
      shimmer_opacity: 0.85
      ring_spin_ms: 3200
    speaking:
      core: "#8aa0b0"
      glow: "rgba(180, 200, 215, 0.75)"
      ring: "rgba(220, 230, 238, 0.9)"
      scale: 1.12
      breathe_amp: 0.1
      breathe_ms: 900
      bloom_opacity: 0.85
      shimmer_opacity: 0.45
      ring_spin_ms: 6000
    paused:
      core: "#242c34"
      glow: "rgba(90, 100, 110, 0.2)"
      ring: "rgba(110, 120, 130, 0.35)"
      scale: 0.92
      breathe_amp: 0.01
      breathe_ms: 8000
      bloom_opacity: 0.15
      shimmer_opacity: 0
      ring_spin_ms: 60000
      saturate: 0.35
    offline:
      core: "#14181c"
      glow: "rgba(60, 70, 80, 0.12)"
      ring: "rgba(70, 80, 90, 0.25)"
      scale: 0.88
      breathe_amp: 0
      breathe_ms: 1
      bloom_opacity: 0.08
      shimmer_opacity: 0
      ring_spin_ms: 120000
      saturate: 0.25
