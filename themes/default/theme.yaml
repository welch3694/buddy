id: default
name: Default
palette:
  void: "#020812"
  void_mid: "#061428"
  teal: "#3de0c8"
  cyan: "#5ee7ff"
  ice: "#b8f4ff"
  amber: "#f0c14a"
  muted: "#4a6a7a"
  danger: "#7a8a92"
fonts:
  display: '"Orbitron", sans-serif'
  mono: '"Share Tech Mono", ui-monospace, monospace'
orb:
  base:
    core: "#1a4a55"
    glow: "rgba(61, 224, 200, 0.35)"
    ring: "rgba(94, 231, 255, 0.55)"
    scale: 1
    breathe_amp: 0.04
    breathe_ms: 3200
    bloom_opacity: 0.35
    shimmer_opacity: 0
    ring_spin_ms: 18000
    saturate: 1
  states:
    listening:
      core: "#1c5c68"
      glow: "rgba(61, 224, 200, 0.4)"
      ring: "rgba(94, 231, 255, 0.5)"
      scale: 1
      breathe_amp: 0.035
      breathe_ms: 3400
      bloom_opacity: 0.4
      shimmer_opacity: 0
      ring_spin_ms: 22000
    holding:
      core: "#2a5570"
      glow: "rgba(120, 200, 255, 0.45)"
      ring: "rgba(160, 220, 255, 0.65)"
      scale: 1.02
      breathe_amp: 0.07
      breathe_ms: 2400
      bloom_opacity: 0.5
      shimmer_opacity: 0.25
      ring_spin_ms: 10000
    generating:
      core: "#246878"
      glow: "rgba(94, 231, 255, 0.55)"
      ring: "rgba(180, 245, 255, 0.7)"
      scale: 1.04
      breathe_amp: 0.055
      breathe_ms: 1400
      bloom_opacity: 0.55
      shimmer_opacity: 0.85
      ring_spin_ms: 3200
    speaking:
      core: "#2fd4c8"
      glow: "rgba(94, 255, 230, 0.75)"
      ring: "rgba(200, 255, 250, 0.9)"
      scale: 1.12
      breathe_amp: 0.1
      breathe_ms: 900
      bloom_opacity: 0.85
      shimmer_opacity: 0.45
      ring_spin_ms: 6000
    paused:
      core: "#2a3840"
      glow: "rgba(100, 120, 130, 0.2)"
      ring: "rgba(120, 140, 150, 0.35)"
      scale: 0.92
      breathe_amp: 0.01
      breathe_ms: 8000
      bloom_opacity: 0.15
      shimmer_opacity: 0
      ring_spin_ms: 60000
      saturate: 0.35
    offline:
      core: "#152028"
      glow: "rgba(70, 90, 100, 0.12)"
      ring: "rgba(80, 100, 110, 0.25)"
      scale: 0.88
      breathe_amp: 0
      breathe_ms: 1
      bloom_opacity: 0.08
      shimmer_opacity: 0
      ring_spin_ms: 120000
      saturate: 0.25
